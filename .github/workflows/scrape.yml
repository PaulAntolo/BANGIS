name: Weekly GasWatch PH Scraper

on:
  schedule:
    # Run every Monday at 00:00 UTC (8:00 AM PH Time)
    - cron: '0 0 * * 1'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./scraper

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './scraper/package-lock.json'

    - name: Install Dependencies
      run: npm install

    - name: Install Playwright Browsers
      run: npx playwright install chromium --with-deps

    - name: Run Scraper
      env:
        # The Firebase Service Account JSON string must be saved in GitHub Secrets as FIREBASE_SERVICE_ACCOUNT
        FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      run: npm start
